<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mohammad Ali | Portfolio</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=yes">
    
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" rel="stylesheet">
    <link rel="stylesheet" href="css/open-iconic-bootstrap.min.css">
    <link rel="stylesheet" href="css/animate.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/aos.css">
    <link rel="stylesheet" href="css/ionicons.min.css">
    <link rel="stylesheet" href="css/flaticon.css">
    <link rel="stylesheet" href="css/icomoon.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            overflow-x: hidden;
        }

        /* Typing Animation */
        #typing-animation {
            font-size: 30px;
            font-weight: bold;
            color: #ffbd39;
        }

        @media (max-width: 768px) {
            #typing-animation { font-size: 20px; }
            .hero .text h1 { font-size: 32px; }
            .container { padding-left: 15px; padding-right: 15px; }
        }

        /* Progress Bars */
        .progress {
            margin: .5rem 0 1.2rem 0;
            border-radius: 10px;
            height: 8px;
            background: rgba(255,255,255,0.2);
        }
        .progress-bar {
            background-color: #ffbd39;
            border-radius: 10px;
            width: 0%;
            transition: width 1.5s ease-in-out;
        }

        /* Cards */
        .exp-card, .stat-card, .project-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .exp-card:hover, .stat-card:hover, .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.12);
            border-color: #ffbd39;
        }
        .exp-card img {
            width: 80px;
            margin-bottom: 15px;
        }
        .exp-card h3, .project-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .exp-card .date {
            color: #ffbd39;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .stat-card .stat-number {
            font-size: 42px;
            font-weight: 700;
            color: #ffbd39;
        }
        .stat-card .stat-label {
            font-size: 14px;
            color: #ccc;
        }

        /* Section Headings */
        .heading-section {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        .heading-section .big {
            font-size: 100px;
            font-weight: 900;
            color: rgba(255,255,255,0.05);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            letter-spacing: 5px;
        }
        .heading-section h2 {
            position: relative;
            z-index: 1;
            font-size: 36px;
        }
        @media (max-width: 768px) {
            .heading-section .big { font-size: 50px; }
            .heading-section h2 { font-size: 28px; }
        }

        /* Blog Section */
        .blog-section {
            position: relative;
            background-image: url('images/bg_1.jpg');
            background-size: cover;
            padding: 80px 0;
            text-align: center;
        }
        .blog-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
        }
        .blog-section .container {
            position: relative;
            z-index: 1;
        }
        .blog-section h2, .blog-section h4 {
            color: #fff;
        }
        .blog-section .btn {
            background: #ffbd39;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
        }
        .blog-section .btn:hover {
            background: #e6a800;
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            padding: 20px 0;
            text-align: center;
        }
    </style>
</head>

        <div class="container">

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#ftco-nav">
                <span class="oi oi-menu"></span> Menu

    <!-- Hero Section -->
    <section id="home" class="hero" style="min-height: 100vh; display: flex; align-items: center;">
        <div class="container">
            <div class="row">
                <div class="col-md-12 text-center">
                    <span class="subheading" style="color: #ffbd39;">Hello!</span>
                    <h1 class="mt-3">I'm <span style="color: #ffbd39;">Mohammad Ali</span></h1>
                    <span id="typing-animation"></span>
                    <script>
                        const typingTexts = ['Student', 'Astronomy Enthusiast', 'Science Communicator'];
                        let textIndex = 0, charIndex = 0;
                        const typingElement = document.getElementById('typing-animation');
                        function typeEffect() {
                            if (charIndex < typingTexts[textIndex].length) {
                                typingElement.textContent += typingTexts[textIndex].charAt(charIndex);
                                charIndex++;
                                setTimeout(typeEffect, 150);
                            } else {
                                setTimeout(() => {
                                    charIndex = 0;
                                    textIndex = (textIndex + 1) % typingTexts.length;
                                    typingElement.textContent = '';
                                    typeEffect();
                                }, 2000);
                            }
                        }
                        typeEffect();
                    </script>
